<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111116"/>
      <stop offset="100%" stop-color="#1a1a21"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <radialGradient id="glow" cx="110" cy="140" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>
  <rect width="440" height="280" fill="url(#glow)"/>

  <!-- Logo (shield + S), scaled 1.1x from 128 canvas -->
  <g transform="translate(32 70) scale(1.09)">
    <path d="M64 8 L112 20 L112 58 C112 90 92 112 64 120 C36 112 16 90 16 58 L16 20 Z"
          fill="url(#shield)" stroke="#064e3b" stroke-width="3" stroke-linejoin="round"/>
    <path d="
        M 82 42
        C 80 33, 70 29, 60 30
        C 48 31, 40 38, 40 48
        C 40 57, 47 62, 58 65
        L 70 68
        C 78 70, 82 73, 82 78
        C 82 85, 74 90, 64 90
        C 54 90, 46 86, 44 78"
      fill="none" stroke="#ffffff" stroke-width="9"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="200" y="126"
        fill="#ffffff"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="800" letter-spacing="-1">Save my S</text>

  <text x="200" y="160"
        fill="#9ca3af"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="15" font-weight="500">Don't feed your secrets to the AI.</text>

  <!-- Trust badge pill -->
  <g>
    <rect x="200" y="184" width="212" height="26" rx="13"
          fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="213" cy="197" r="3" fill="#10b981"/>
    <text x="224" y="201"
          fill="#10b981"
          font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="11" font-weight="700" letter-spacing="0.3">100% LOCAL · NO TELEMETRY</text>
  </g>
</svg>
